spring:
  application:
    name: backend

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${DB_PATH}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: true
    open-in-view: false
server:
  servlet:
    session:
      timeout: 30m  # 세션 타임아웃 30분
      cookie:
        name: JSESSIONID
        http-only: true
        secure: false  # 개발환경에서는 false
        same-site: lax
        max-age: 1800  # 30분
        
swagger:
  url: ${SWAGGER_URL}

# 날씨 API 설정
weather:
  api:
    base-url: https://api.openweathermap.org
    path: /data/3.0/onecall
    key: ${WEATHER_API_KEY}
    connect-timeout: 5000
    read-timeout: 5000
    write-timeout: 5000

airkorea:
  dust-url: ${DUST_URL}
  station-url: ${STATION_URL}
  service-key: ${AIRKOREA_SERVICE_KEY}   # 환경변수에서 주입
